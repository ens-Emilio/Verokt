services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verokt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verokt}
      POSTGRES_DB: ${POSTGRES_DB:-verokt}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verokt}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-verokt}:${POSTGRES_PASSWORD:-verokt}@postgres:5432/${POSTGRES_DB:-verokt}
      REDIS_URL: redis://redis:6379
      BACKEND_PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      COMPATIBLE_PROVIDER_NAME: ${COMPATIBLE_PROVIDER_NAME}
      COMPATIBLE_BASE_URL: ${COMPATIBLE_BASE_URL}
      COMPATIBLE_API_KEY: ${COMPATIBLE_API_KEY}
      COMPATIBLE_MODELS: ${COMPATIBLE_MODELS}
      COMPATIBLE_MODEL: ${COMPATIBLE_MODEL}
      NATIVE_PROVIDER: ${NATIVE_PROVIDER:-anthropic}
      NATIVE_API_KEY: ${NATIVE_API_KEY}
      NATIVE_MODEL: ${NATIVE_MODEL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  worker:
    build:
      context: .
      target: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npx", "tsx", "packages/backend/src/workers/index.ts"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-verokt}:${POSTGRES_PASSWORD:-verokt}@postgres:5432/${POSTGRES_DB:-verokt}
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      COMPATIBLE_PROVIDER_NAME: ${COMPATIBLE_PROVIDER_NAME}
      COMPATIBLE_BASE_URL: ${COMPATIBLE_BASE_URL}
      COMPATIBLE_API_KEY: ${COMPATIBLE_API_KEY}
      COMPATIBLE_MODELS: ${COMPATIBLE_MODELS}
      COMPATIBLE_MODEL: ${COMPATIBLE_MODEL}
      NATIVE_PROVIDER: ${NATIVE_PROVIDER:-anthropic}
      NATIVE_API_KEY: ${NATIVE_API_KEY}
      NATIVE_MODEL: ${NATIVE_MODEL}
      JWT_SECRET: ${JWT_SECRET}

  frontend:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  pgdata:
  redisdata:
